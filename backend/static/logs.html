<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inner Garden - 运行日志</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1f35 0%, #2d1b3d 100%);
            color: #e6eefc;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header .subtitle {
            color: rgba(230, 238, 252, 0.6);
            font-size: 14px;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px 24px;
            min-width: 140px;
        }

        .stat-card .label {
            font-size: 12px;
            color: rgba(230, 238, 252, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 600;
            margin-top: 8px;
        }

        .stat-card.info .value { color: #4ade80; }
        .stat-card.warning .value { color: #fbbf24; }
        .stat-card.error .value { color: #f87171; }
        .stat-card.debug .value { color: #60a5fa; }
        .stat-card.critical .value { color: #c084fc; }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #e6eefc;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .filter-btn.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .filter-btn.all.active { background: rgba(96, 165, 250, 0.3); border-color: #60a5fa; }
        .filter-btn.info.active { background: rgba(74, 222, 128, 0.3); border-color: #4ade80; }
        .filter-btn.warning.active { background: rgba(251, 191, 36, 0.3); border-color: #fbbf24; }
        .filter-btn.error.active { background: rgba(248, 113, 113, 0.3); border-color: #f87171; }

        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #e6eefc;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .action-btn.danger:hover {
            background: rgba(248, 113, 113, 0.2);
            border-color: #f87171;
        }

        .logs-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .logs-header {
            display: grid;
            grid-template-columns: 80px 180px 1fr;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            color: rgba(230, 238, 252, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 80px 180px 1fr;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.15s;
            font-size: 14px;
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-level {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            width: fit-content;
        }

        .log-level.info { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .log-level.warning { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .log-level.error { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .log-level.debug { background: rgba(96, 165, 250, 0.2); color: #60a5fa; }
        .log-level.critical { background: rgba(192, 132, 252, 0.2); color: #c084fc; }

        .log-time {
            color: rgba(230, 238, 252, 0.5);
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 13px;
        }

        .log-message {
            color: #e6eefc;
            word-break: break-word;
        }

        .log-details {
            grid-column: 2 / -1;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            font-size: 12px;
            color: rgba(230, 238, 252, 0.6);
            display: none;
        }

        .log-entry.expanded .log-details {
            display: block;
        }

        .log-details span {
            margin-right: 16px;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: rgba(230, 238, 252, 0.4);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: rgba(230, 238, 252, 0.5);
        }

        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid rgba(230, 238, 252, 0.3);
            border-top-color: #e6eefc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auto-refresh-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(230, 238, 252, 0.5);
        }

        .auto-refresh-indicator.active {
            color: #4ade80;
        }

        .auto-refresh-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .login-required {
            text-align: center;
            padding: 80px 20px;
        }

        .login-required h2 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .login-required a {
            color: #60a5fa;
            text-decoration: none;
        }

        .login-required a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>Inner Garden 运行日志</h1>
                <div class="subtitle">实时查看应用运行日志与系统状态</div>
            </div>
            <div class="auto-refresh-indicator" id="autoRefreshIndicator">自动刷新</div>
        </div>

        <div id="loginRequired" class="login-required" style="display: none;">
            <h2>需要管理员权限</h2>
            <p>此页面仅限管理员访问。</p>
            <p>默认管理员: <strong>admin</strong> / <strong>admin123456</strong></p>

            <div class="login-form" style="margin-top: 20px;">
                <input type="text" id="usernameInput" placeholder="用户名 (admin)" value="admin" style="margin-right: 10px; padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #e6eefc;">
                <input type="password" id="passwordInput" placeholder="密码" style="margin-right: 10px; padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #e6eefc;">
                <button onclick="doLogin()" style="padding: 8px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(96, 165, 250, 0.3); color: #e6eefc; cursor: pointer;">登录</button>
            </div>
            <div id="loginError" style="color: #f87171; margin-top: 10px; display: none;"></div>
            <p style="margin-top: 15px;">或<a href="#" onclick="window.location.href = '/frontend/#/login'; return false;">通过前端登录</a></p>
        </div>

        <div id="logViewer">
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="label">总计</div>
                    <div class="value" id="totalLogs">-</div>
                </div>
                <div class="stat-card info">
                    <div class="label">Info</div>
                    <div class="value" id="infoLogs">-</div>
                </div>
                <div class="stat-card warning">
                    <div class="label">Warning</div>
                    <div class="value" id="warningLogs">-</div>
                </div>
                <div class="stat-card error">
                    <div class="label">Error</div>
                    <div class="value" id="errorLogs">-</div>
                </div>
            </div>

            <div class="controls">
                <div class="filter-group">
                    <button class="filter-btn all active" data-level="">全部</button>
                    <button class="filter-btn info" data-level="info">Info</button>
                    <button class="filter-btn warning" data-level="warning">Warning</button>
                    <button class="filter-btn error" data-level="error">Error</button>
                </div>
                <button class="action-btn" id="refreshBtn">刷新</button>
                <button class="action-btn danger" id="clearBtn">清空日志</button>
            </div>

            <div class="logs-container">
                <div class="logs-header">
                    <div>级别</div>
                    <div>时间</div>
                    <div>消息</div>
                </div>
                <div id="logsBody">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1';
        let currentFilter = '';
        let autoRefreshInterval = null;
        let isLoggedIn = false;

        // Check authentication status
        async function checkAuth() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    showLoginRequired();
                    return false;
                }

                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    showLoginRequired();
                    return false;
                }

                const data = await response.json();
                const user = data.data;

                // Check if user is admin
                if (user && user.role === 'admin') {
                    isLoggedIn = true;
                    hideLoginRequired();
                    return true;
                } else {
                    // User is authenticated but not an admin
                    isLoggedIn = false;
                    const errorDiv = document.getElementById('loginError');
                    if (errorDiv) {
                        errorDiv.textContent = '当前账户不是管理员。请使用管理员账户登录。';
                        errorDiv.style.display = 'block';
                    }
                    showLoginRequired();
                    localStorage.removeItem('access_token'); // Clear non-admin token
                    return false;
                }
            } catch (error) {
                showLoginRequired();
                return false;
            }
        }

        function showLoginRequired() {
            document.getElementById('loginRequired').style.display = 'block';
            document.getElementById('logViewer').style.display = 'none';
        }

        function hideLoginRequired() {
            document.getElementById('loginRequired').style.display = 'none';
            document.getElementById('logViewer').style.display = 'block';
        }

        // Fetch logs from API
        async function fetchLogs(level = '') {
            const token = localStorage.getItem('access_token');
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE}/logs/entries?level=${level}&limit=200`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    showLoginRequired();
                    return;
                }

                const data = await response.json();
                return data.data;
            } catch (error) {
                console.error('Failed to fetch logs:', error);
                return null;
            }
        }

        // Fetch stats from API
        async function fetchStats() {
            const token = localStorage.getItem('access_token');
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE}/logs/stats`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    showLoginRequired();
                    return;
                }

                const data = await response.json();
                return data.data;
            } catch (error) {
                console.error('Failed to fetch stats:', error);
                return null;
            }
        }

        // Render logs
        function renderLogs(logs) {
            const container = document.getElementById('logsBody');

            if (!logs || logs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p>暂无日志记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = logs.map(log => {
                const timestamp = new Date(log.timestamp);
                const timeStr = timestamp.toLocaleTimeString('zh-CN', { hour12: false }) + '.' +
                                 String(timestamp.getMilliseconds()).padStart(3, '0');

                const details = [];
                if (log.request_id) details.push(`请求ID: ${log.request_id}`);
                if (log.path) details.push(`路径: ${log.method || ''} ${log.path}`);
                if (log.status_code) details.push(`状态: ${log.status_code}`);
                if (log.duration_ms) details.push(`耗时: ${log.duration_ms}ms`);

                return `
                    <div class="log-entry" onclick="this.classList.toggle('expanded')">
                        <div>
                            <span class="log-level ${log.level.toLowerCase()}">${log.level.toUpperCase()}</span>
                        </div>
                        <div class="log-time">${timeStr}</div>
                        <div class="log-message">${escapeHtml(log.message)}</div>
                        ${details.length ? `<div class="log-details">${details.map(d => escapeHtml(d)).join(' · ')}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Render stats
        function renderStats(stats) {
            if (!stats) return;

            document.getElementById('totalLogs').textContent = stats.total || 0;
            document.getElementById('infoLogs').textContent = stats.info || 0;
            document.getElementById('warningLogs').textContent = stats.warning || 0;
            document.getElementById('errorLogs').textContent = stats.error || 0;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Refresh logs and stats
        async function refresh() {
            const logs = await fetchLogs(currentFilter);
            if (logs) {
                renderLogs(logs.logs || logs);
            }

            const stats = await fetchStats();
            if (stats) {
                renderStats(stats);
            }
        }

        // Clear logs
        async function clearLogs() {
            if (!confirm('确定要清空所有日志吗？此操作无法撤销。')) return;

            const token = localStorage.getItem('access_token');
            if (!token) return;

            try {
                await fetch(`${API_BASE}/logs/clear`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                refresh();
            } catch (error) {
                console.error('Failed to clear logs:', error);
            }
        }

        // Toggle auto refresh
        function toggleAutoRefresh() {
            const indicator = document.getElementById('autoRefreshIndicator');

            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                indicator.classList.remove('active');
                indicator.textContent = '自动刷新 (已停止)';
            } else {
                autoRefreshInterval = setInterval(refresh, 5000);
                indicator.classList.add('active');
                indicator.textContent = '自动刷新 (运行中)';
            }
        }

        // Handle admin login
        async function doLogin() {
            const username = document.getElementById('usernameInput').value;
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('loginError');

            if (!username || !password) {
                errorDiv.textContent = '请输入用户名和密码';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.data && data.data.access_token) {
                    // Store the token
                    localStorage.setItem('access_token', data.data.access_token);
                    localStorage.setItem('user_info', JSON.stringify(data.data.user));

                    // Check if user is admin
                    if (data.data.user && data.data.user.role === 'admin') {
                        // Hide login form and show log viewer
                        hideLoginRequired();
                        // Initialize the log viewer
                        init();
                    } else {
                        errorDiv.textContent = '需要管理员权限。此账户不是管理员。';
                        errorDiv.style.display = 'block';
                        localStorage.removeItem('access_token');
                    }
                } else {
                    errorDiv.textContent = data.message || '登录失败';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '登录请求失败: ' + error.message;
                errorDiv.style.display = 'block';
            }
        }

        // Initialize
        let initialized = false;

        async function init() {
            // Prevent double initialization
            if (initialized) return;
            initialized = true;

            // Check authentication first
            const authenticated = await checkAuth();
            if (!authenticated) return;

            // Set up event listeners
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.level;
                    refresh();
                });
            });

            document.getElementById('refreshBtn').addEventListener('click', refresh);
            document.getElementById('clearBtn').addEventListener('click', clearLogs);
            document.getElementById('autoRefreshIndicator').addEventListener('click', toggleAutoRefresh);

            // Enable auto refresh by default
            toggleAutoRefresh();

            // Initial load
            refresh();
        }

        // Start
        init();
    </script>
</body>
</html>
